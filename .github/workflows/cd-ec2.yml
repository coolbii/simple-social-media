name: CD - EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/simple-social-media

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.meta.outputs.api_image }}
      web_image: ${{ steps.meta.outputs.web_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: meta
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "api_image=ghcr.io/${OWNER}/simple-social-media-api" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${OWNER}/simple-social-media-web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:${{ github.sha }}
            ${{ steps.meta.outputs.api_image }}:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:${{ github.sha }}
            ${{ steps.meta.outputs.web_image }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required deploy secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          set -euo pipefail
          for key in EC2_HOST EC2_USER EC2_SSH_PRIVATE_KEY GHCR_READ_TOKEN; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required secret in production environment: ${key}"
              exit 1
            fi
          done

      - name: Configure SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [[ -n "${{ secrets.EC2_SSH_KNOWN_HOSTS }}" ]]; then
            echo "${{ secrets.EC2_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
          fi

      - name: Upload deployment manifests
        run: |
          set -euo pipefail
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "mkdir -p ${DEPLOY_PATH}"
          scp -r deploy "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${DEPLOY_PATH}/"

      - name: Deploy on EC2
        env:
          API_IMAGE: ${{ needs.build-and-push.outputs.api_image }}:${{ github.sha }}
          WEB_IMAGE: ${{ needs.build-and-push.outputs.web_image }}:${{ github.sha }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd ${DEPLOY_PATH}/deploy && \
             test -f .env.api && \
             echo '${{ secrets.GHCR_READ_TOKEN }}' | docker login ghcr.io -u '${{ github.repository_owner }}' --password-stdin && \
             API_IMAGE='${API_IMAGE}' WEB_IMAGE='${WEB_IMAGE}' GIT_SHA='${GIT_SHA}' ./ec2/deploy.sh"
