spring.application.name=api
server.port=8080

# The DB layer is scaffolded but not wired yet. Exclude JDBC/MyBatis auto-config
# so the API can start and expose OpenAPI before MySQL is provisioned.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.example.social=INFO
