spring:
  application:
    name: api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: ${DB_MIGRATION_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${APP_STORAGE_MAX_FILE_SIZE:2MB}
      max-request-size: ${APP_STORAGE_MAX_REQUEST_SIZE:2MB}

server:
  port: ${API_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.social: ${API_LOG_LEVEL:INFO}

app:
  auth:
    access-token-ttl-seconds: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:900}
    # 30 days by default for refresh token lifecycle in current auth spec (#002).
    refresh-token-ttl-seconds: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:2592000}
    registration-token-ttl-seconds: ${AUTH_REGISTRATION_TOKEN_TTL_SECONDS:600}
    otp:
      max-attempts: ${AUTH_OTP_MAX_ATTEMPTS:5}
    access-token-secret: ${AUTH_ACCESS_TOKEN_SECRET:change-me-in-env}
    session-cookie-name: ${AUTH_SESSION_COOKIE_NAME:social.sid}
    # Set true in production (HTTPS) to prevent cookie exposure over HTTP.
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    sms:
      provider: ${AUTH_SMS_PROVIDER:mock}
      twilio:
        account-sid: ${TWILIO_ACCOUNT_SID:}
        auth-token: ${TWILIO_AUTH_TOKEN:}
        verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID:}
        # Keep aligned with existing Python service default.
        locale: ${TWILIO_VERIFY_LOCALE:zh-HK}
  storage:
    max-file-size-bytes: ${APP_STORAGE_MAX_FILE_SIZE_BYTES:1048576}
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_REGION:}
      presign-expire-seconds: ${AWS_S3_PRESIGN_EXPIRE_SECONDS:900}
      signed-get-expire-seconds: ${AWS_S3_SIGNED_GET_EXPIRE_SECONDS:3600}
      public-base-url: ${AWS_S3_PUBLIC_BASE_URL:}
