services:
  mysql:
    image: mysql:8.0
    container_name: simple-social-media-mysql
    restart: unless-stopped
    env_file:
      - .env.db
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
      - ./DB/ddl/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql:ro
      - ./DB/ddl/002_create_indexes.sql:/docker-entrypoint-initdb.d/002_create_indexes.sql:ro
      - ./DB/dml/001_seed_data.sql:/docker-entrypoint-initdb.d/003_seed_data.sql:ro
      - ./DB/sp/001_user_procedures.sql:/docker-entrypoint-initdb.d/004_user_procedures.sql:ro
      - ./DB/sp/002_post_procedures.sql:/docker-entrypoint-initdb.d/005_post_procedures.sql:ro
      - ./DB/sp/003_comment_procedures.sql:/docker-entrypoint-initdb.d/006_comment_procedures.sql:ro
      - ./DB/sp/004_refresh_token_procedures.sql:/docker-entrypoint-initdb.d/007_refresh_token_procedures.sql:ro

volumes:
  mysql_data:
